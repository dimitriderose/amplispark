name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run backend tests with coverage
        run: python -m pytest backend/tests/ -v --tb=short --cov=backend --cov-report=term-missing --cov-report=xml --cov-fail-under=0
        env:
          GOOGLE_API_KEY: dummy
          FIREBASE_PROJECT_ID: dummy
          GCS_BUCKET_NAME: dummy

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: TypeScript build check
        run: npm run build
        working-directory: frontend
        env:
          VITE_FIREBASE_API_KEY: dummy
          VITE_FIREBASE_AUTH_DOMAIN: dummy
          VITE_FIREBASE_PROJECT_ID: dummy
          VITE_FIREBASE_STORAGE_BUCKET: dummy
          VITE_FIREBASE_MESSAGING_SENDER_ID: dummy
          VITE_FIREBASE_APP_ID: dummy

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Frontend tests (unit + coverage)
        run: npm run test:coverage --if-present
        working-directory: frontend
        # Vitest not yet configured — tracked in GitHub issue #1 (90% coverage sprint)
