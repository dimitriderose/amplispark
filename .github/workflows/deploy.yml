name: CI/CD — Deploy to Production

on:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Ruff lint
        run: ruff check backend/

      - name: Ruff format check
        run: ruff format --check backend/

      - name: Mypy type check
        run: mypy backend/ --ignore-missing-imports
        env:
          GOOGLE_API_KEY: dummy
          FIREBASE_PROJECT_ID: dummy
          GCS_BUCKET_NAME: dummy

      - name: Tests + coverage
        run: python -m pytest backend/tests/ -v --tb=short --cov=backend --cov-report=term-missing --cov-report=xml --cov-fail-under=0
        env:
          GOOGLE_API_KEY: dummy
          FIREBASE_PROJECT_ID: dummy
          GCS_BUCKET_NAME: dummy

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: TypeScript type check
        run: npm run typecheck
        working-directory: frontend

      - name: Lint (zero warnings)
        run: npm run lint
        working-directory: frontend

      - name: Unit tests
        run: npm run test
        working-directory: frontend

      - name: Production build
        run: npm run build
        working-directory: frontend
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

  deploy:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/282839045411/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: amplispark-cicd@amplifi-488503-a0bd0.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Write .env from secrets
        run: |
          cat > .env << 'ENVEOF'
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION=${{ secrets.GCP_REGION }}
          CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
          NOTION_CLIENT_ID=${{ secrets.NOTION_CLIENT_ID }}
          NOTION_REDIRECT_URI=${{ secrets.NOTION_REDIRECT_URI }}
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          NOTION_CLIENT_SECRET=${{ secrets.NOTION_CLIENT_SECRET }}
          TOKEN_ENCRYPT_KEY=${{ secrets.TOKEN_ENCRYPT_KEY }}
          ENVEOF

      - name: Deploy via Cloud Build
        run: bash scripts/deploy.sh
