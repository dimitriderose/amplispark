[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --cov=backend --cov-report=term-missing --cov-fail-under=0
# Target: 90% coverage — tracked in GitHub issue #1
# --cov-fail-under is set to 0 (warn only) until coverage is built up
