# ──────────────────────────────────────────────────────────────────────────────
# Amplispark — Cloud Build Pipeline
# Builds the Docker image (with Firebase config baked in at build time),
# pushes to Artifact Registry, and deploys to Cloud Run.
#
# Usage:
#   ./scripts/deploy.sh              # reads .env, runs gcloud builds submit
#   gcloud builds submit \            # or run manually with substitutions
#     --config=cloudbuild.yaml \
#     --substitutions=_VITE_FIREBASE_API_KEY=...,_VITE_FIREBASE_AUTH_DOMAIN=...
#
# No secrets are stored in this file. All sensitive keys (GOOGLE_API_KEY,
# RESEND_API_KEY, NOTION_CLIENT_SECRET, TOKEN_ENCRYPT_KEY) are pulled from
# Secret Manager at Cloud Run deploy time via --set-secrets.
# ──────────────────────────────────────────────────────────────────────────────

steps:
  # Step 0: Run backend tests
  - name: 'python:3.12-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install --quiet -r backend/requirements.txt &&
        cd backend &&
        python -m pytest tests/ -v --tb=short

  # Step 1: Build Docker image with Firebase config as build args
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg=VITE_FIREBASE_API_KEY=${_VITE_FIREBASE_API_KEY}'
      - '--build-arg=VITE_FIREBASE_AUTH_DOMAIN=${_VITE_FIREBASE_AUTH_DOMAIN}'
      - '--build-arg=VITE_FIREBASE_PROJECT_ID=${_VITE_FIREBASE_PROJECT_ID}'
      - '--build-arg=VITE_FIREBASE_STORAGE_BUCKET=${_VITE_FIREBASE_STORAGE_BUCKET}'
      - '--build-arg=VITE_FIREBASE_MESSAGING_SENDER_ID=${_VITE_FIREBASE_MESSAGING_SENDER_ID}'
      - '--build-arg=VITE_FIREBASE_APP_ID=${_VITE_FIREBASE_APP_ID}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/amplifi/amplifi:latest'
      - '-f'
      - 'backend/Dockerfile'
      - '.'

  # Step 2: Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/amplifi/amplifi:latest'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'amplifi'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/amplifi/amplifi:latest'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--update-env-vars=GCP_PROJECT_ID=${PROJECT_ID},GCS_BUCKET_NAME=${PROJECT_ID}-amplifi-assets,CORS_ORIGINS=${_CORS_ORIGINS},NOTION_CLIENT_ID=${_NOTION_CLIENT_ID},NOTION_REDIRECT_URI=${_NOTION_REDIRECT_URI},GEMINI_MODEL=gemini-3-flash-preview'
      - '--set-secrets=GOOGLE_API_KEY=GOOGLE_API_KEY:latest,RESEND_API_KEY=RESEND_API_KEY:latest,NOTION_CLIENT_SECRET=NOTION_CLIENT_SECRET:latest,TOKEN_ENCRYPT_KEY=TOKEN_ENCRYPT_KEY:latest'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--timeout=300'
      - '--min-instances=1'
      - '--max-instances=10'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/amplifi/amplifi:latest'

substitutions:
  _REGION: 'us-central1'
  _VITE_FIREBASE_API_KEY: ''
  _VITE_FIREBASE_AUTH_DOMAIN: ''
  _VITE_FIREBASE_PROJECT_ID: ''
  _VITE_FIREBASE_STORAGE_BUCKET: ''
  _VITE_FIREBASE_MESSAGING_SENDER_ID: ''
  _VITE_FIREBASE_APP_ID: ''
  _CORS_ORIGINS: ''
  _NOTION_CLIENT_ID: ''
  _NOTION_REDIRECT_URI: ''

options:
  logging: CLOUD_LOGGING_ONLY
