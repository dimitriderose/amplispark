# ──────────────────────────────────────────────────────────────────────────────
# Amplispark — Cloud Build Pipeline
# Builds the Docker image (with Firebase config baked in at build time),
# pushes to Artifact Registry, and deploys to Cloud Run.
#
# Usage:
#   ./scripts/deploy.sh              # reads .env, runs gcloud builds submit
#   gcloud builds submit \            # or run manually with substitutions
#     --config=cloudbuild.yaml \
#     --substitutions=_VITE_FIREBASE_API_KEY=...,_VITE_FIREBASE_AUTH_DOMAIN=...
#
# Sensitive keys (GOOGLE_API_KEY, RESEND_API_KEY, NOTION_CLIENT_SECRET,
# TOKEN_ENCRYPT_KEY) are passed via Cloud Build substitutions sourced from
# GitHub Secrets → .env → scripts/deploy.sh.
# ──────────────────────────────────────────────────────────────────────────────

steps:
  # Step 0: Pull previous images for layer cache (allowed to fail on first build).
  # Two tags are pulled:
  #   :builder — Stage 1 (node:20-slim) layers, caches npm ci across builds
  #   :latest  — Stage 2 (python:3.12-slim) layers, caches pip install + apt
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker pull ${_REGION}-docker.pkg.dev/${PROJECT_ID}/amplifi/amplifi:builder || true
        docker pull ${_REGION}-docker.pkg.dev/${PROJECT_ID}/amplifi/amplifi:latest  || true

  # Step 1: Build Stage 1 (frontend builder) targeting the builder stage.
  # Pushing this tag separately makes the npm ci layer cacheable across builds —
  # without it, Stage 1 layers are never stored in the registry and must be
  # rebuilt from scratch every time (npm ci = ~30-60 s per build).
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--target=builder'
      - '--cache-from=${_REGION}-docker.pkg.dev/${PROJECT_ID}/amplifi/amplifi:builder'
      - '--build-arg=VITE_FIREBASE_API_KEY=${_VITE_FIREBASE_API_KEY}'
      - '--build-arg=VITE_FIREBASE_AUTH_DOMAIN=${_VITE_FIREBASE_AUTH_DOMAIN}'
      - '--build-arg=VITE_FIREBASE_PROJECT_ID=${_VITE_FIREBASE_PROJECT_ID}'
      - '--build-arg=VITE_FIREBASE_STORAGE_BUCKET=${_VITE_FIREBASE_STORAGE_BUCKET}'
      - '--build-arg=VITE_FIREBASE_MESSAGING_SENDER_ID=${_VITE_FIREBASE_MESSAGING_SENDER_ID}'
      - '--build-arg=VITE_FIREBASE_APP_ID=${_VITE_FIREBASE_APP_ID}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/amplifi/amplifi:builder'
      - '-f'
      - 'backend/Dockerfile'
      - '.'

  # Step 2: Push the builder stage so its layers are available as cache next build
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/amplifi/amplifi:builder'

  # Step 3: Build the final runtime image, seeding cache from both stages
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--cache-from=${_REGION}-docker.pkg.dev/${PROJECT_ID}/amplifi/amplifi:builder'
      - '--cache-from=${_REGION}-docker.pkg.dev/${PROJECT_ID}/amplifi/amplifi:latest'
      - '--build-arg=VITE_FIREBASE_API_KEY=${_VITE_FIREBASE_API_KEY}'
      - '--build-arg=VITE_FIREBASE_AUTH_DOMAIN=${_VITE_FIREBASE_AUTH_DOMAIN}'
      - '--build-arg=VITE_FIREBASE_PROJECT_ID=${_VITE_FIREBASE_PROJECT_ID}'
      - '--build-arg=VITE_FIREBASE_STORAGE_BUCKET=${_VITE_FIREBASE_STORAGE_BUCKET}'
      - '--build-arg=VITE_FIREBASE_MESSAGING_SENDER_ID=${_VITE_FIREBASE_MESSAGING_SENDER_ID}'
      - '--build-arg=VITE_FIREBASE_APP_ID=${_VITE_FIREBASE_APP_ID}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/amplifi/amplifi:latest'
      - '-f'
      - 'backend/Dockerfile'
      - '.'

  # Step 4: Push the final runtime image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/amplifi/amplifi:latest'

  # Step 5: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'amplifi'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/amplifi/amplifi:latest'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--update-env-vars=GCP_PROJECT_ID=${PROJECT_ID},GCS_BUCKET_NAME=${PROJECT_ID}-amplifi-assets,CORS_ORIGINS=${_CORS_ORIGINS},NOTION_CLIENT_ID=${_NOTION_CLIENT_ID},NOTION_REDIRECT_URI=${_NOTION_REDIRECT_URI},GEMINI_MODEL=gemini-3.5-flash,GOOGLE_API_KEY=${_GOOGLE_API_KEY},RESEND_API_KEY=${_RESEND_API_KEY},NOTION_CLIENT_SECRET=${_NOTION_CLIENT_SECRET},TOKEN_ENCRYPT_KEY=${_TOKEN_ENCRYPT_KEY}'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--timeout=300'
      - '--min-instances=1'
      - '--max-instances=10'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/amplifi/amplifi:builder'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/amplifi/amplifi:latest'

substitutions:
  _REGION: 'us-central1'
  _VITE_FIREBASE_API_KEY: ''
  _VITE_FIREBASE_AUTH_DOMAIN: ''
  _VITE_FIREBASE_PROJECT_ID: ''
  _VITE_FIREBASE_STORAGE_BUCKET: ''
  _VITE_FIREBASE_MESSAGING_SENDER_ID: ''
  _VITE_FIREBASE_APP_ID: ''
  _CORS_ORIGINS: ''
  _NOTION_CLIENT_ID: ''
  _NOTION_REDIRECT_URI: ''
  _GOOGLE_API_KEY: ''
  _RESEND_API_KEY: ''
  _NOTION_CLIENT_SECRET: ''
  _TOKEN_ENCRYPT_KEY: ''

options:
  logging: CLOUD_LOGGING_ONLY
