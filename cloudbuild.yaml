# ──────────────────────────────────────────────────────────────────────────────
# Amplifi — Cloud Build Pipeline
# Builds the Docker image (with Firebase config baked in at build time),
# pushes to Artifact Registry, and deploys to Cloud Run.
#
# Usage:
#   ./scripts/deploy.sh              # reads .env, runs gcloud builds submit
#   gcloud builds submit \            # or run manually with substitutions
#     --config=cloudbuild.yaml \
#     --substitutions=_VITE_FIREBASE_API_KEY=...,_VITE_FIREBASE_AUTH_DOMAIN=...
#
# No secrets are stored in this file. All values are passed via substitutions.
# The Gemini API key (GOOGLE_API_KEY) is set on Cloud Run by Terraform, not here.
# ──────────────────────────────────────────────────────────────────────────────

steps:
  # Step 1: Build Docker image with Firebase config as build args
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg=VITE_FIREBASE_API_KEY=${_VITE_FIREBASE_API_KEY}'
      - '--build-arg=VITE_FIREBASE_AUTH_DOMAIN=${_VITE_FIREBASE_AUTH_DOMAIN}'
      - '--build-arg=VITE_FIREBASE_PROJECT_ID=${_VITE_FIREBASE_PROJECT_ID}'
      - '--build-arg=VITE_FIREBASE_STORAGE_BUCKET=${_VITE_FIREBASE_STORAGE_BUCKET}'
      - '--build-arg=VITE_FIREBASE_MESSAGING_SENDER_ID=${_VITE_FIREBASE_MESSAGING_SENDER_ID}'
      - '--build-arg=VITE_FIREBASE_APP_ID=${_VITE_FIREBASE_APP_ID}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/amplifi/amplifi:latest'
      - '-f'
      - 'backend/Dockerfile'
      - '.'

  # Step 2: Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/amplifi/amplifi:latest'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'amplifi'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/amplifi/amplifi:latest'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/amplifi/amplifi:latest'

substitutions:
  _REGION: 'us-central1'
  _VITE_FIREBASE_API_KEY: ''
  _VITE_FIREBASE_AUTH_DOMAIN: ''
  _VITE_FIREBASE_PROJECT_ID: ''
  _VITE_FIREBASE_STORAGE_BUCKET: ''
  _VITE_FIREBASE_MESSAGING_SENDER_ID: ''
  _VITE_FIREBASE_APP_ID: ''

options:
  logging: CLOUD_LOGGING_ONLY
